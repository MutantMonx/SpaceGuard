<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a0e"/>
      <stop offset="100%" stop-color="#0c1015"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f2a100"/>
      <stop offset="50%" stop-color="#00f2ff"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Top Bar -->
  <rect x="20" y="15" width="1240" height="55" fill="#0f141c" stroke="#1e2633" stroke-width="1" rx="4"/>
  <g transform="translate(35, 27)">
    <polygon points="12,0 24,6 24,18 12,24 0,18 0,6" fill="#a855f7" fill-opacity="0.2" stroke="#a855f7" stroke-width="2"/>
    <circle cx="12" cy="12" r="4" fill="#00f2ff"/>
    <text x="34" y="17" fill="#ffffff" font-weight="900" font-size="18" class="mono" letter-spacing="1">SPACEGUARD <tspan fill="#a855f7">v1.2.0</tspan></text>
  </g>
  <text x="320" y="47" fill="#94a3b8" font-size="11" class="mono">MODULE: <tspan fill="#a855f7" font-weight="bold">D3 INTERACTIVE DEPENDENCY GRAPH VISUALIZER</tspan></text>

  <!-- Tabs -->
  <g transform="translate(20, 80)">
    <rect width="1240" height="42" fill="#0b0f14" stroke="#1e2633" stroke-width="1" rx="4"/>
    <rect x="6" y="5" width="170" height="32" fill="#0f141c" rx="3"/>
    <text x="22" y="25" fill="#94a3b8" font-size="11" font-weight="bold" class="mono">📦 Package Manager</text>

    <rect x="182" y="5" width="170" height="32" fill="#0f141c" rx="3"/>
    <text x="198" y="25" fill="#94a3b8" font-size="11" font-weight="bold" class="mono">🗺️ Disk Space Map</text>

    <rect x="358" y="5" width="160" height="32" fill="#0f141c" rx="3"/>
    <text x="374" y="25" fill="#94a3b8" font-size="11" font-weight="bold" class="mono">💻 CLI Console</text>

    <rect x="524" y="5" width="190" height="32" fill="#a855f7" fill-opacity="0.18" stroke="#a855f7" stroke-width="1" rx="3"/>
    <text x="540" y="25" fill="#c084fc" font-size="11" font-weight="bold" class="mono">🕸️ Dependency Graph</text>

    <rect x="720" y="5" width="170" height="32" fill="#0f141c" rx="3"/>
    <text x="736" y="25" fill="#94a3b8" font-size="11" font-weight="bold" class="mono">🐳 Containers</text>
  </g>

  <!-- Graph Workspace -->
  <g transform="translate(20, 132)">
    <rect width="1240" height="570" fill="#0f141c" stroke="#1e2633" stroke-width="1" rx="4"/>

    <!-- Graph Canvas Area -->
    <g transform="translate(20, 20)">
      <!-- Connecting Lines -->
      <line x1="500" y1="260" x2="300" y2="120" stroke="#a855f7" stroke-width="2" stroke-dasharray="4 4"/>
      <line x1="500" y1="260" x2="250" y2="260" stroke="#00f2ff" stroke-width="2"/>
      <line x1="500" y1="260" x2="320" y2="400" stroke="#f2a100" stroke-width="2"/>
      <line x1="500" y1="260" x2="720" y2="140" stroke="#10b981" stroke-width="2"/>
      <line x1="500" y1="260" x2="780" y2="280" stroke="#38bdf8" stroke-width="2"/>
      <line x1="500" y1="260" x2="700" y2="420" stroke="#ef4444" stroke-width="2"/>

      <!-- Central Target Node: metasploit-framework -->
      <circle cx="500" cy="260" r="45" fill="#a855f7" fill-opacity="0.25" stroke="#a855f7" stroke-width="3"/>
      <text x="500" y="262" fill="#ffffff" font-size="11" font-weight="bold" class="mono" text-anchor="middle">metasploit</text>
      <text x="500" y="278" fill="#e9d5ff" font-size="9" class="mono" text-anchor="middle">1.84 GB</text>

      <!-- Dependency Nodes -->
      <!-- Node 1: ruby-full -->
      <circle cx="300" cy="120" r="30" fill="#f2a100" fill-opacity="0.2" stroke="#f2a100" stroke-width="2"/>
      <text x="300" y="124" fill="#fde047" font-size="10" font-weight="bold" class="mono" text-anchor="middle">ruby-full</text>

      <!-- Node 2: postgresql-client -->
      <circle cx="250" cy="260" r="32" fill="#00f2ff" fill-opacity="0.2" stroke="#00f2ff" stroke-width="2"/>
      <text x="250" y="264" fill="#38bdf8" font-size="10" font-weight="bold" class="mono" text-anchor="middle">postgres</text>

      <!-- Node 3: libc6 (Shared core) -->
      <circle cx="320" cy="400" r="28" fill="#38bdf8" fill-opacity="0.2" stroke="#38bdf8" stroke-width="2"/>
      <text x="320" y="404" fill="#7dd3fc" font-size="10" font-weight="bold" class="mono" text-anchor="middle">libc6</text>

      <!-- Node 4: libssl3 -->
      <circle cx="720" cy="140" r="28" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="2"/>
      <text x="720" y="144" fill="#34d399" font-size="10" font-weight="bold" class="mono" text-anchor="middle">libssl3</text>

      <!-- Node 5: nmap -->
      <circle cx="780" cy="280" r="30" fill="#a855f7" fill-opacity="0.2" stroke="#a855f7" stroke-width="2"/>
      <text x="780" y="284" fill="#c084fc" font-size="10" font-weight="bold" class="mono" text-anchor="middle">nmap</text>

      <!-- Node 6: python3-requests -->
      <circle cx="700" cy="420" r="28" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="2"/>
      <text x="700" y="424" fill="#f87171" font-size="10" font-weight="bold" class="mono" text-anchor="middle">python3</text>
    </g>

    <!-- Side Analysis Panel -->
    <g transform="translate(870, 20)">
      <rect width="350" height="530" fill="#080c10" stroke="#1e2633" stroke-width="1" rx="4"/>
      <text x="20" y="30" fill="#64748b" font-size="11" font-weight="bold" class="mono">IMPACT SIMULATION ENGINE</text>
      <line x1="20" y1="40" x2="330" y2="40" stroke="#1e2633" stroke-width="1"/>

      <text x="20" y="65" fill="#ffffff" font-size="13" font-weight="bold" class="mono">Target: metasploit-framework</text>
      <text x="20" y="85" fill="#94a3b8" font-size="11" class="mono">Size Reclaimed: <tspan fill="#34d399" font-weight="bold">1.84 GB</tspan></text>

      <rect x="20" y="105" width="310" height="120" fill="#141a24" stroke="#334155" stroke-width="1" rx="3"/>
      <text x="32" y="130" fill="#f2a100" font-size="11" font-weight="bold" class="mono">⚠️ CASCADING DEPENDENCY AUDIT:</text>
      <text x="32" y="155" fill="#cbd5e1" font-size="10" class="mono">• 28 dependent packages link to libc6</text>
      <text x="32" y="175" fill="#34d399" font-size="10" class="mono">• Safe to purge: metasploit binaries only</text>
      <text x="32" y="195" fill="#38bdf8" font-size="10" class="mono">• Rollback command generated instantly</text>

      <rect x="20" y="240" width="310" height="40" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="1" rx="3"/>
      <text x="80" y="265" fill="#f87171" font-size="11" font-weight="bold" class="mono">SIMULATE PURGE CLEANUP</text>
    </g>
  </g>
</svg>
